# ─────────────────────────────────────────────────────────────
# Smart Lost & Found Platform  –  Application Configuration
# ─────────────────────────────────────────────────────────────

spring.application.name=SmartLostFound

# ── Server ────────────────────────────────────────────────────
server.port=8080
server.error.include-message=always

# ── DataSource  (H2 for dev – switch to MySQL for prod) ───────
spring.datasource.url=jdbc:h2:file:./data/lostfounddb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL (uncomment + fill in for production):
# spring.datasource.url=jdbc:mysql://localhost:3306/lostfounddb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Prod: org.hibernate.dialect.MySQL8Dialect

# ── JWT ───────────────────────────────────────────────────────
# Must be a Base64 string that decodes to at least 32 bytes (256 bits) for HS256
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=uploads/

# ── Mail  (configure real SMTP for production) ────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# IMPORTANT: prevents startup crash when mail server is not configured
spring.mail.test-connection=false

# ── Logging ───────────────────────────────────────────────────
logging.level.com.portal.lostfound=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
